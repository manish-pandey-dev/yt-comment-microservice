# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────
# Triggered on every push to master branch.
# Connects to your Raspberry Pi via SSH and deploys latest code.
# ─────────────────────────────────────────────────────────────────

name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: SSH Deploy to Pi
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          password: ${{ secrets.PI_PASSWORD }}
          port:     22
          request_pty: false
          script: |

            echo "──────────────────────────────────"
            echo "Starting deployment..."
            echo "──────────────────────────────────"

            # Navigate to project folder
            cd github-projects/yt-comment-microservice

            # Pull latest code from GitHub
            git pull origin master

            # Activate Python virtual environment
            source venv/bin/activate

            # Install any new dependencies
            pip install -r requirements.txt

            # Kill existing uvicorn process if running
            pkill -f "uvicorn app.main:app" || true

            # Wait a moment for port to be released
            sleep 2

            # Start uvicorn fully detached from this SSH session
            # disown ensures process keeps running after SSH closes
            nohup venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
            disown $!

            echo "──────────────────────────────────"
            echo "Deployment complete!"
            echo "──────────────────────────────────"